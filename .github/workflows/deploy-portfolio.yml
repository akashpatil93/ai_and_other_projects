name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'portfolio/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Prepare Deployment Directory
        run: |
          mkdir public
          # The dot after portfolio/ ensures we copy the contents, not the folder itself
          cp -a portfolio/. public/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing to the new folder where index.html is at the root
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
