<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Payment - Movie Ticket Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Confirm Your Booking</h1>
        </header>

        <main>
            <div class="payment-container">
                <div id="booking-summary" class="booking-details">
                    <!-- Booking details will be populated by JavaScript -->
                </div>

                <div class="payment-actions">
                    <button id="confirm-payment" class="button primary">Confirm Payment</button>
                </div>
            </div>
        </main>
    </div>
    <script src="payment.js"></script>
</body>
</html>
